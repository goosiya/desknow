# DeskNow CI — 게이트 호출 바인딩 (Story 1.9, AC3).
#
# 본 파일은 이미 검증된 게이트(Layer A pytest / Layer B turbo test)를 호출하는 **얇은 바인딩**일
# 뿐 새 로직을 만들지 않는다. 2026-06-20 git/원격 구성으로 활성화됨(push:main · PR 트리거).
#
# 범위(Story 1.9 Task 7): 드리프트 + 기존 정적 게이트(lint/check-types/ruff/mypy/pytest)로 한정.
#   DB 의존 통합테스트는 라이브 DB 부재로 현행처럼 skip된다(배포 준비 시 서비스 컨테이너로 확장).

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JS 게이트 (lint · check-types · drift Layer B)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
      - uses: actions/setup-node@v4
        with:
          # pnpm 11.5.2는 Node ≥22.13 필요(node:sqlite 사용) → 20은 크래시. GitHub도 Node 20 deprecate.
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # lint(직접 fetch 금지 가드, AC2) + check-types(세 표면 SDK 컴파일, AC1)
      # + test(api-client check:drift = Layer B 드리프트, AC3).
      - run: pnpm turbo run lint check-types test

  api:
    name: 백엔드 게이트 (ruff · mypy · pytest · drift Layer A)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen  # uv.lock 강제(JS 잡 --frozen-lockfile과 대칭)
      - run: uv run ruff check .
      - run: uv run mypy
      # pytest는 Layer A 드리프트(test_openapi_export)를 포함한다(AC3).
      # DB 의존 통합테스트는 DATABASE_URL 부재로 skip된다(현행 유지).
      - run: uv run pytest
